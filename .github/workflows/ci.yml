name: ci
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, builder02, lxc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # The signature/protocol parity golden files (razor/testdata/*.tsv) are
      # committed, because razor's Perl modules are not apt-installable on current
      # Debian. Regenerate locally with razor/testdata/gen_expected.pl +
      # gen_protocol.pl against deb/razor/tmp/razor-2.85/lib.

      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race ./...
      - name: fuzz (smoke)
        run: go test -run=x -fuzz=FuzzSignatures -fuzztime=30s ./razor/

  lint:
    runs-on: [self-hosted, builder02, lxc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  codeql:
    runs-on: [self-hosted, builder02, lxc]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - uses: github/codeql-action/analyze@v3
